<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사주 프로그램</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --line: #d9e1ef;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 90% 0%, #dcfce7 0%, transparent 45%), var(--bg);
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 14px 48px;
    }
    h1 { margin: 0 0 6px; font-size: 30px; }
    .sub { margin: 0 0 18px; color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 6px 18px rgba(17, 24, 39, 0.06);
    }
    .title { margin: 0 0 10px; font-size: 17px; }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 10px;
    }
    label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 4px; }
    input, select, button {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
    }
    button {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 700;
      cursor: pointer;
    }
    .actions { display: flex; gap: 10px; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      border: 1px solid var(--line);
      padding: 8px;
      text-align: center;
      font-size: 14px;
    }
    th { background: #f8fafc; }
    .pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #ecfeff;
      border: 1px solid #a5f3fc;
      font-size: 12px;
      margin-right: 6px;
      margin-bottom: 6px;
    }
    .note {
      font-size: 13px;
      color: #374151;
      line-height: 1.5;
      white-space: pre-line;
    }
    .warn {
      color: #b91c1c;
      font-size: 12px;
      margin-top: 8px;
    }
    @media (max-width: 780px) {
      .form-grid { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>사주 프로그램</h1>
    <p class="sub">생년월일시 입력으로 사주 팔자(연/월/일/시주)와 오행 분포를 계산합니다.</p>

    <div class="grid">
      <section class="card">
        <h2 class="title">입력</h2>
        <div class="form-grid">
          <div>
            <label for="birthDate">생년월일</label>
            <input id="birthDate" type="date" />
          </div>
          <div>
            <label for="birthTime">출생시각</label>
            <input id="birthTime" type="time" value="12:00" />
          </div>
          <div>
            <label for="gender">성별(선택)</label>
            <select id="gender">
              <option value="">선택안함</option>
              <option value="남">남</option>
              <option value="여">여</option>
            </select>
          </div>
          <div>
            <label for="name">이름(선택)</label>
            <input id="name" type="text" placeholder="홍길동" />
          </div>
        </div>
        <div class="actions">
          <button id="calcBtn" type="button">사주 계산</button>
        </div>
        <p class="warn">참고: 본 계산은 절기 경계(고정일 기반) 단순화 모델로, 전문가용 만세력과 일부 차이가 있을 수 있습니다.</p>
      </section>

      <section class="card">
        <h2 class="title">사주 팔자</h2>
        <table>
          <thead>
            <tr>
              <th>기둥</th>
              <th>천간</th>
              <th>지지</th>
              <th>한자 조합</th>
            </tr>
          </thead>
          <tbody id="pillarBody">
            <tr><td colspan="4">입력 후 계산 버튼을 눌러주세요.</td></tr>
          </tbody>
        </table>
      </section>

      <section class="card">
        <h2 class="title">오행 분포</h2>
        <div id="elements"></div>
      </section>

      <section class="card">
        <h2 class="title">간단 해석</h2>
        <div id="summary" class="note">결과가 여기에 표시됩니다.</div>
      </section>
    </div>
  </div>

  <script>
    const stems = ['갑','을','병','정','무','기','경','신','임','계'];
    const branches = ['자','축','인','묘','진','사','오','미','신','유','술','해'];
    const stemHan = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
    const branchHan = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];

    const stemElement = {
      '갑':'목','을':'목','병':'화','정':'화','무':'토',
      '기':'토','경':'금','신':'금','임':'수','계':'수'
    };
    const branchElement = {
      '자':'수','축':'토','인':'목','묘':'목','진':'토','사':'화',
      '오':'화','미':'토','신':'금','유':'금','술':'토','해':'수'
    };

    const monthBranchBySolar = ['축','인','묘','진','사','오','미','신','유','술','해','자'];
    const monthStemStartByYearStem = {
      '갑': '병','기': '병',
      '을': '무','경': '무',
      '병': '경','신': '경',
      '정': '임','임': '임',
      '무': '갑','계': '갑'
    };

    function sexagenary(index) {
      const stem = stems[(index % 10 + 10) % 10];
      const branch = branches[(index % 12 + 12) % 12];
      return { stem, branch };
    }

    function toJulianDay(y, m, d) {
      const a = Math.floor((14 - m) / 12);
      const yy = y + 4800 - a;
      const mm = m + 12 * a - 3;
      return d + Math.floor((153 * mm + 2) / 5) + 365 * yy + Math.floor(yy / 4) - Math.floor(yy / 100) + Math.floor(yy / 400) - 32045;
    }

    function getYearPillar(date) {
      const y = date.getFullYear();
      const m = date.getMonth() + 1;
      const d = date.getDate();
      const afterIpchun = (m > 2) || (m === 2 && d >= 4);
      const sajuYear = afterIpchun ? y : y - 1;
      const index = (sajuYear - 1984) % 60;
      return sexagenary(index);
    }

    function getMonthIndex(date) {
      const m = date.getMonth() + 1;
      const d = date.getDate();
      const cut = [6,4,6,5,6,7,8,8,8,8,7,7];
      const adjustedMonth = d >= cut[m - 1] ? m : (m - 1 <= 0 ? 12 : m - 1);
      return adjustedMonth;
    }

    function getMonthPillar(date, yearStem) {
      const month = getMonthIndex(date);
      const monthBranch = monthBranchBySolar[(month + 10) % 12];
      const startStem = monthStemStartByYearStem[yearStem];
      const startIdx = stems.indexOf(startStem);
      const branchIdx = branches.indexOf(monthBranch);
      const tigerIdx = branches.indexOf('인');
      const offset = (branchIdx - tigerIdx + 12) % 12;
      const monthStem = stems[(startIdx + offset) % 10];
      return { stem: monthStem, branch: monthBranch };
    }

    function getDayPillar(date) {
      const y = date.getFullYear();
      const m = date.getMonth() + 1;
      const d = date.getDate();
      const jd = toJulianDay(y, m, d);
      const index = (jd + 49) % 60;
      return sexagenary(index);
    }

    function getHourBranch(hour, minute) {
      const h = hour + minute / 60;
      if (h >= 23 || h < 1) return '자';
      if (h < 3) return '축';
      if (h < 5) return '인';
      if (h < 7) return '묘';
      if (h < 9) return '진';
      if (h < 11) return '사';
      if (h < 13) return '오';
      if (h < 15) return '미';
      if (h < 17) return '신';
      if (h < 19) return '유';
      if (h < 21) return '술';
      return '해';
    }

    function getHourPillar(dayStem, hourBranch) {
      const dayStemIndex = stems.indexOf(dayStem);
      const hourBranchIndex = branches.indexOf(hourBranch);
      const startMap = [0,2,4,6,8,0,2,4,6,8];
      const startStemIndex = startMap[dayStemIndex];
      const stem = stems[(startStemIndex + hourBranchIndex) % 10];
      return { stem, branch: hourBranch };
    }

    function buildInterpretation(name, gender, pillars, elementCounts) {
      const dayMaster = pillars.day.stem;
      const dayElem = stemElement[dayMaster];
      const sorted = Object.entries(elementCounts).sort((a,b) => b[1] - a[1]);
      const maxElem = sorted[0][0];
      const minElem = sorted[sorted.length - 1][0];

      const who = name ? `${name}님의` : '사용자님의';
      const genderText = gender ? ` (${gender})` : '';

      return `${who} 일간은 ${dayMaster}(${dayElem})${genderText}입니다.
가장 강한 오행은 ${maxElem}, 상대적으로 약한 오행은 ${minElem}으로 나타났습니다.
강한 오행은 추진력/표현 방식으로 드러나고, 약한 오행은 생활 습관이나 환경에서 보완하면 균형에 도움이 됩니다.
이 결과는 참고용 간이 해석이며, 정밀 해석은 대운/세운/절기 보정까지 함께 보시는 것을 권장합니다.`;
    }

    function renderPillars(pillars) {
      const body = document.getElementById('pillarBody');
      const rows = [
        ['연주', pillars.year],
        ['월주', pillars.month],
        ['일주', pillars.day],
        ['시주', pillars.hour]
      ];
      body.innerHTML = rows.map(([label, p]) => {
        const han = `${stemHan[stems.indexOf(p.stem)]}${branchHan[branches.indexOf(p.branch)]}`;
        return `<tr><td>${label}</td><td>${p.stem}</td><td>${p.branch}</td><td>${han}</td></tr>`;
      }).join('');
    }

    function renderElements(pillars) {
      const counts = { 목: 0, 화: 0, 토: 0, 금: 0, 수: 0 };
      Object.values(pillars).forEach((p) => {
        counts[stemElement[p.stem]] += 1;
        counts[branchElement[p.branch]] += 1;
      });

      const el = document.getElementById('elements');
      el.innerHTML = Object.entries(counts)
        .map(([k, v]) => `<span class="pill">${k}: ${v}</span>`)
        .join('');

      return counts;
    }

    function calcSaju() {
      const dateVal = document.getElementById('birthDate').value;
      const timeVal = document.getElementById('birthTime').value || '12:00';
      const gender = document.getElementById('gender').value;
      const name = document.getElementById('name').value.trim();

      if (!dateVal) {
        alert('생년월일을 입력해주세요.');
        return;
      }

      const [y, m, d] = dateVal.split('-').map(Number);
      const [hh, mm] = timeVal.split(':').map(Number);
      const date = new Date(y, m - 1, d, hh, mm, 0);

      const year = getYearPillar(date);
      const month = getMonthPillar(date, year.stem);
      const day = getDayPillar(date);
      const hourBranch = getHourBranch(hh, mm);
      const hour = getHourPillar(day.stem, hourBranch);

      const pillars = { year, month, day, hour };
      renderPillars(pillars);
      const elementCounts = renderElements(pillars);
      document.getElementById('summary').textContent = buildInterpretation(name, gender, pillars, elementCounts);
    }

    document.getElementById('calcBtn').addEventListener('click', calcSaju);

    const today = new Date();
    const defaultDate = new Date(today.getFullYear() - 30, today.getMonth(), today.getDate());
    document.getElementById('birthDate').value = `${defaultDate.getFullYear()}-${String(defaultDate.getMonth()+1).padStart(2, '0')}-${String(defaultDate.getDate()).padStart(2, '0')}`;
  </script>
</body>
</html>
